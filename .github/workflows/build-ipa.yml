name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List project files
      run: |
        echo "=== Root directory ==="
        ls -la
        echo ""
        echo "=== Project directory ==="
        ls -la AutumnOkraGameAssistant/
        echo ""
        echo "=== Check Xcode project ==="
        ls -la AutumnOkraGameAssistant.xcodeproj/

    - name: Build and Archive (No Code Signing)
      run: |
        xcodebuild archive \
          -project AutumnOkraGameAssistant.xcodeproj \
          -scheme AutumnOkraGameAssistant \
          -configuration Release \
          -archivePath build/AutumnOkraGameAssistant.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -destination generic/platform=iOS \
          VERBOSE=1 || {
            echo "=== Build failed, checking archive directory ==="
            ls -la build/ 2>/dev/null || true
            echo "=== Checking DerivedData logs ==="
            find ~/Library/Developer/Xcode/DerivedData -name "*.log" -mtime -1 -exec echo "=== {} ===" \; -exec tail -50 {} \;
            exit 1
          }

    - name: Export IPA (No Code Signing)
      run: |
        # 创建 exportOptions.plist
        cat > exportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string></string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>provisioningProfiles</key>
            <dict/>
        </dict>
        </plist>
        EOF

        xcodebuild -exportArchive \
          -archivePath build/AutumnOkraGameAssistant.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist exportOptions.plist \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Verify IPA
      run: |
        echo "=== Checking for IPA file ==="
        find build/export -name "*.ipa"
        ls -la build/export/

    - name: Upload IPA as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutumnOkraGameAssistant-IPA
        path: build/export/*.ipa
        retention-days: 30
        if-no-files-found: error

    - name: Create Release Summary
      run: |
        echo "## 📱 秋葵游戏助手 IPA 打包完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ 构建成功" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "IPA 文件已生成并上传为 GitHub Artifact。" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 进入本 Workflow 的 Actions 页面" >> $GITHUB_STEP_SUMMARY
        echo "2. 找到对应运行记录" >> $GITHUB_STEP_SUMMARY
        echo "3. 在 Artifacts 区域下载 \`AutumnOkraGameAssistant-IPA\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎮 功能特性" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ 实时变声（萝莉/大叔/机器人/电音等7种效果）" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ 音效板（8种常用音效）" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ 悬浮工具箱（亮度/触感/勿扰/网络/录屏/截图）" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ 专为游戏场景优化" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ⚠️ 使用说明" >> $GITHUB_STEP_SUMMARY
        echo "1. 下载 IPA 文件" >> $GITHUB_STEP_SUMMARY
        echo "2. 使用 TrollStore 安装" >> $GITHUB_STEP_SUMMARY
        echo "3. 授予麦克风和相册权限" >> $GITHUB_STEP_SUMMARY
        echo "4. 开始使用！" >> $GITHUB_STEP_SUMMARY
